[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --alluredir=reports/allure-results
markers =
    smoke: Quick tests for core functionality
    regression: Full suite regression tests
    ingestion: Tests for the ingestion layer
    transformation: Tests for the transformation layer
    loader: Tests for the database loader layer
    validation: Tests for the data validation engine
    e2e: End-to-end pipeline tests
    slow: Tests that take a long time to run
